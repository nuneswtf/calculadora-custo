<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dify - Calculadora Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calc-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            border: 1px solid #e2e8f0;
        }

        h1 { font-size: 1.5rem; color: #1e293b; text-align: center; margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1rem; }

        label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--secondary); margin-bottom: 0.25rem; }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }

        button:hover { background: #1d4ed8; }

        .results {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #e2e8f0;
            display: none;
        }

        .res-line { display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: #475569; }

        .total-line {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--success);
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="calc-card">
    <h1>3Dify Calculator</h1>
    
    <div class="input-group">
        <label>Tempo de Impressão (Horas)</label>
        <input type="number" id="tempo" placeholder="ex: 4.5" step="0.1">
    </div>

    <div class="input-group">
        <label>Preço do Filamento (R$ por Kg)</label>
        <input type="number" id="precoKg" value="120">
    </div>

    <div class="input-group">
        <label>Peso da Peça (Gramas)</label>
        <input type="number" id="peso" placeholder="ex: 100">
    </div>

    <div class="input-group">
        <label>Seu Valor Hora (R$)</label>
        <input type="number" id="vHora" placeholder="ex: 15">
    </div>

    <div class="input-group">
        <label>Canal de Venda</label>
        <select id="mkt">
            <option value="shopee">Shopee (20% + R$3)</option>
            <option value="ml">Mercado Livre (17% + R$6)</option>
            <option value="amazon">Amazon (15% + R$2)</option>
            <option value="direta">Venda Direta (0%)</option>
        </select>
    </div>

    <button onclick="calcular()">Calcular Agora</button>

    <div id="res" class="results">
        <div class="res-line"><span>Custo Material:</span> <span id="rMat">R$ 0,00</span></div>
        <div class="res-line"><span>Custo Máquina:</span> <span id="rMaq">R$ 0,00</span></div>
        <div class="res-line"><span>Mão de Obra:</span> <span id="rMao">R$ 0,00</span></div>
        <div class="res-line total-line"><span>Preço Final:</span> <span id="rTotal">R$ 0,00</span></div>
    </div>
</div>

<script>
    function calcular() {
        const t = parseFloat(document.getElementById('tempo').value) || 0;
        const pKg = parseFloat(document.getElementById('precoKg').value) || 0;
        const p = parseFloat(document.getElementById('peso').value) || 0;
        const vH = parseFloat(document.getElementById('vHora').value) || 0;
        const m = document.getElementById('mkt').value;

        const custoMat = (pKg / 1000) * p;
        const custoMaq = t * 0.80; // R$ 0,80 por hora (energia + manutenção)
        const maoObra = t * vH;
        
        let comissao = 0, fixa = 0;
        if(m === 'shopee') { comissao = 0.20; fixa = 3; }
        else if(m === 'ml') { comissao = 0.17; fixa = 6; }
        else if(m === 'amazon') { comissao = 0.15; fixa = 2; }

        const subtotal = custoMat + custoMaq + maoObra + fixa;
        const precoFinal = subtotal / (1 - (comissao + 0.06)); // 6% de imposto base

        document.getElementById('res').style.display = 'block';
        document.getElementById('rMat').innerText = `R$ ${custoMat.toFixed(2)}`;
        document.getElementById('rMaq').innerText = `R$ ${custoMaq.toFixed(2)}`;
        document.getElementById('rMao').innerText = `R$ ${maoObra.toFixed(2)}`;
        document.getElementById('rTotal').innerText = `R$ ${precoFinal.toFixed(2)}`;
    }
</script>

</body>
</html>
